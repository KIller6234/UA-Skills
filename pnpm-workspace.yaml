packages:
  - 'apps/*'
  - 'libs/*'

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  msgpackr-extract: true
  prisma: true

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - argon2
  - msgpackr-extract
  - prisma
